name: "Terraform PR Preview Deployment"

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_IN_AUTOMATION: true

jobs:
  terraform:
    name: "Terraform PR Preview Deployment"
    defaults:
      run:
        working-directory: ./terraform/dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      api_url: ${{ steps.terraform-outputs.outputs.api_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Workspace
        run: terraform workspace select -or-create pr${{ github.event.number }}

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -no-color

      - name: Get Terraform Outputs
        id: terraform-outputs
        run: echo "api_url=$(terraform output -raw api_url)" >> $GITHUB_OUTPUT

      - name: Publish Results to Step Summary
        if: always()
        run: |
          cat <<EOF >> $GITHUB_STEP_SUMMARY
          # Terraform PR Preview Deployment

          <details open>
          <summary>Terraform Apply: ${{ steps.apply.outcome == 'success' && '✅ Passed' || '❌ Failed' }}</summary>

          \`\`\`
          ${{ steps.apply.outputs.stdout }}
          \`\`\`

          </details>
          EOF

      - name: Add Comment to PR
        uses: actions/github-script@v8
        with:
          script: |
            const marker = "<!-- pr-preview -->";
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = `${marker}
            ## Terraform PR Preview Deployment

            **Deployment Status:** ${{ steps.apply.outcome == 'success' && '✅ Success' || '❌ Failure' }}

            To develop locally, set the \`NEXT_PUBLIC_API_URL\` environment variable to ${{ steps.terraform-outputs.outputs.api_url }}

            A full result of the deployment run is available in the workflow summary here: ${runUrl}
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });

            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

  vercel-preview:
    name: "Update Vercel Preview Environment"
    runs-on: ubuntu-latest
    needs: terraform
    if: ${{ needs.terraform.outputs.api_url != '' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    outputs:
      skip_redeploy: ${{ steps.apply_api_url.outputs.skip_redeploy }}

    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Check and update NEXT_PUBLIC_API_URL
        id: apply_api_url
        run: |
          BRANCH="${{ github.head_ref }}"
          API_URL="${{ needs.terraform.outputs.api_url }}"
          vercel env pull --environment preview --git-branch "$BRANCH" --token="$VERCEL_TOKEN" --no-color 
          CURRENT=$(cat .env.local | grep "NEXT_PUBLIC_API_URL" || true)

          if [ "$CURRENT" = "NEXT_PUBLIC_API_URL=$API_URL" ]; then
            echo "NEXT_PUBLIC_API_URL already set to correct value, skipping."
            echo "skip_redeploy=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "$API_URL" | vercel env add NEXT_PUBLIC_API_URL preview "$BRANCH" --token="$VERCEL_TOKEN" --force --no-color
          echo "Set NEXT_PUBLIC_API_URL=$API_URL for branch $BRANCH"

      - name: Redeploy Vercel preview
        if: ${{ steps.apply_api_url.outputs.skip_redeploy != 'true' }}
        run: |
          BRANCH="${{ github.head_ref }}"
          DEPLOYMENT_URL="laprogram-git-$BRANCH-xalbd-team.vercel.app"
          vercel redeploy "$DEPLOYMENT_URL" --token="$VERCEL_TOKEN" --scope xalbd-team --no-color --no-wait
